<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Site.Title }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; }
    header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 60px 20px; text-align: center; }
    header h1 { font-size: 2.5em; margin-bottom: 10px; }
    header p { font-size: 1.1em; opacity: 0.9; }
    .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    .posts { display: grid; gap: 30px; }
    .post-card { border: 1px solid #eee; padding: 20px; border-radius: 8px; }
    .post-card h2 { margin: 10px 0; }
    .post-card a { color: #667eea; text-decoration: none; font-weight: bold; }
    .post-card a:hover { text-decoration: underline; }
    .meta { color: #666; font-size: 0.9em; margin: 10px 0; }
    footer { background: #f5f5f5; padding: 20px; text-align: center; margin-top: 60px; }
  </style>
</head>
<body>
  <header>
    <h1>{{ .Site.Title }}</h1>
    <p>{{ .Site.Params.description }}</p>
  </header>

  <div class="container">
    <h2 style="margin-bottom: 30px;">最新の記事</h2>
    <div class="posts">
      {{ range where .Site.RegularPages "Section" "posts" }}
      <div class="post-card">
        <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
        <div class="meta">📅 {{ .Date.Format "2006-01-02" }}</div>
        <p>{{ .Summary }}</p>
        <p><a href="{{ .Permalink }}">続きを読む →</a></p>
      </div>
      {{ end }}
    </div>
  </div>

  <footer>
    <p>&copy; {{ now.Year }} {{ .Site.Params.author }}. All rights reserved.</p>
  </footer>
</body>
</html>
